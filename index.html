<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Mahasiswa - Scan QR Presensi</title>
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { -webkit-text-size-adjust: 100%; font-size: 16px; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f8fafc; color: #1e293b; line-height: 1.6;
      min-height: 100vh; display: flex; flex-direction: column;
    }

    /* Navbar */
    .navbar {
      background: #2563eb; color: white; padding: 14px 18px;
      display: flex; align-items: center; gap: 10px;
      box-shadow: 0 2px 10px rgba(37,99,235,0.3);
    }
    .navbar h1 { font-size: 1.05rem; font-weight: 700; }
    .navbar .badge {
      background: rgba(255,255,255,0.2); font-size: 0.68rem; padding: 3px 10px;
      border-radius: 99px; font-weight: 700; margin-left: auto;
    }

    /* Main */
    .main { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 16px 12px; }

    /* Steps */
    .step { width: 100%; max-width: 460px; display: none; flex-direction: column; }
    .step.active { display: flex; }

    /* Step 1: NIM */
    .nim-card {
      background: #fff; border-radius: 16px; padding: 24px 20px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06); border: 1px solid #e2e8f0;
    }
    .nim-card h2 { font-size: 1.05rem; margin-bottom: 6px; }
    .nim-card p { font-size: 0.85rem; color: #64748b; margin-bottom: 16px; }
    .form-group { margin-bottom: 14px; }
    .form-group label { display: block; font-size: 0.78rem; font-weight: 700; color: #64748b; margin-bottom: 4px; text-transform: uppercase; }
    .form-group input {
      width: 100%; padding: 14px 16px; border: 2px solid #e2e8f0;
      border-radius: 12px; font-size: 18px; font-weight: 700;
      text-align: center; letter-spacing: 2px; color: #1e293b;
      -webkit-appearance: none; transition: border-color 0.2s;
    }
    .form-group input:focus { outline: none; border-color: #2563eb; box-shadow: 0 0 0 3px rgba(37,99,235,0.15); }

    .btn {
      width: 100%; padding: 14px; border: none; border-radius: 12px;
      font-weight: 800; font-size: 1rem; cursor: pointer; min-height: 52px;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      -webkit-tap-highlight-color: transparent; touch-action: manipulation;
      transition: all 0.15s;
    }
    .btn-primary { background: #2563eb; color: white; }
    .btn-primary:hover { background: #1d4ed8; }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-outline { background: transparent; color: #2563eb; border: 2px solid #2563eb; }
    .btn-success { background: #16a34a; color: white; }
    .btn-danger { background: #dc2626; color: white; }

    /* Step 2: Scanner */
    .scanner-card {
      background: #fff; border-radius: 16px; overflow: hidden;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06); border: 1px solid #e2e8f0;
    }
    .scanner-header {
      padding: 16px 20px; background: #f8fafc; border-bottom: 1px solid #e2e8f0;
      display: flex; align-items: center; justify-content: space-between;
    }
    .scanner-header h2 { font-size: 0.95rem; }
    .scanner-header .nim-display {
      background: #2563eb; color: white; padding: 3px 12px;
      border-radius: 99px; font-size: 0.8rem; font-weight: 700; font-family: monospace;
    }

    #qr-reader {
      width: 100%; min-height: 300px;
    }
    #qr-reader video { border-radius: 0 !important; }

    .scanner-footer {
      padding: 16px 20px; text-align: center;
    }
    .scanner-hint {
      font-size: 0.82rem; color: #64748b; margin-bottom: 12px;
    }

    /* Step 3: Result */
    .result-card {
      background: #fff; border-radius: 16px; padding: 32px 24px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06); border: 1px solid #e2e8f0;
      text-align: center;
    }
    .result-icon { font-size: 4rem; margin-bottom: 12px; }
    .result-card h2 { font-size: 1.2rem; margin-bottom: 6px; }
    .result-card .result-msg { font-size: 0.9rem; color: #64748b; margin-bottom: 8px; }
    .result-detail {
      background: #f8fafc; border-radius: 10px; padding: 14px;
      margin: 16px 0; text-align: left; font-size: 0.85rem; color: #475569;
    }
    .result-detail .row { display: flex; justify-content: space-between; padding: 4px 0; }
    .result-detail .row .label { color: #94a3b8; font-weight: 600; }
    .result-detail .row .val { font-weight: 700; color: #1e293b; font-family: monospace; }

    .result-card .btn { margin-top: 16px; }

    /* Error result */
    .result-card.error { border-color: #fecaca; }
    .result-card.error h2 { color: #dc2626; }

    /* Success result */
    .result-card.success { border-color: #bbf7d0; }
    .result-card.success h2 { color: #16a34a; }

    /* Processing overlay */
    .processing {
      display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.6); z-index: 999;
      flex-direction: column; align-items: center; justify-content: center;
    }
    .processing.visible { display: flex; }
    .processing .spinner-big {
      width: 48px; height: 48px; border: 4px solid rgba(255,255,255,0.3);
      border-radius: 50%; border-top-color: #fff; animation: spin 0.7s linear infinite;
    }
    .processing p { color: white; margin-top: 16px; font-weight: 600; font-size: 1rem; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Responsive */
    @media (min-width: 600px) {
      .main { padding: 32px 20px; }
      .nim-card, .scanner-card, .result-card { max-width: 460px; }
      .form-group input { font-size: 22px; }
    }
  </style>
</head>
<body>

<div class="navbar">
  <span>📱</span>
  <h1>Presensi QR — Mahasiswa</h1>
  <span class="badge">SCAN</span>
</div>

<div class="main">

  <!-- ===== STEP 1: Input NIM ===== -->
  <div class="step active" id="step-nim">
    <div class="nim-card">
      <h2>👋 Halo, Mahasiswa!</h2>
      <p>Masukkan NIM kamu, lalu scan QR Code yang ditampilkan dosen di layar.</p>
      <div class="form-group">
        <label>NIM / User ID</label>
        <input type="text" id="input-nim" inputmode="numeric" placeholder="434231xxx" autocomplete="off" />
      </div>
      <button class="btn btn-primary" id="btn-next" onclick="goToScanner()">
        📷 Lanjut ke Scanner
      </button>
    </div>
  </div>

  <!-- ===== STEP 2: QR Scanner ===== -->
  <div class="step" id="step-scanner">
    <div class="scanner-card">
      <div class="scanner-header">
        <h2>📷 Scan QR Code</h2>
        <span class="nim-display" id="display-nim">-</span>
      </div>
      <div id="qr-reader"></div>
      <div class="scanner-footer">
        <p class="scanner-hint">Arahkan kamera ke QR Code yang ditampilkan di layar proyektor</p>
        <button class="btn btn-outline" onclick="backToNim()">← Ganti NIM</button>
      </div>
    </div>
  </div>

  <!-- ===== STEP 3: Result ===== -->
  <div class="step" id="step-result">
    <div class="result-card" id="result-card">
      <div class="result-icon" id="result-icon">✅</div>
      <h2 id="result-title">Berhasil Check-in!</h2>
      <p class="result-msg" id="result-msg">Presensi kamu sudah tercatat.</p>
      <div class="result-detail" id="result-detail"></div>
      <button class="btn btn-primary" onclick="resetAll()">📷 Scan Lagi</button>
    </div>
  </div>

</div>

<!-- Processing overlay -->
<div class="processing" id="processing">
  <div class="spinner-big"></div>
  <p>Memproses check-in...</p>
</div>

<script>
var userId = '';
var html5QrCode = null;
var isProcessing = false;

function callServer(fnName, arg) {
  return new Promise(function(resolve, reject) {
    google.script.run
      .withSuccessHandler(resolve)
      .withFailureHandler(function(err) { reject(err); })
      [fnName](arg);
  });
}

function showStep(name) {
  document.querySelectorAll('.step').forEach(function(s) { s.classList.remove('active'); });
  document.getElementById('step-' + name).classList.add('active');
}

function goToScanner() {
  userId = document.getElementById('input-nim').value.trim();
  if (!userId) {
    alert('Masukkan NIM dulu!');
    return;
  }

  document.getElementById('display-nim').textContent = userId;
  showStep('scanner');
  startScanner();
}

function backToNim() {
  stopScanner();
  showStep('nim');
}

function startScanner() {
  if (html5QrCode) {
    try { html5QrCode.stop(); } catch(e) {}
  }

  html5QrCode = new Html5Qrcode('qr-reader');

  html5QrCode.start(
    { facingMode: 'environment' },
    {
      fps: 10,
      qrbox: function(viewfinderWidth, viewfinderHeight) {
        var size = Math.min(viewfinderWidth, viewfinderHeight) * 0.75;
        return { width: size, height: size };
      },
      aspectRatio: 1.0
    },
    onScanSuccess,
    function(errorMessage) { /* ignore scan errors */ }
  ).catch(function(err) {
    console.error('Camera error:', err);
    document.getElementById('qr-reader').innerHTML =
      '<div style="padding:40px;text-align:center;color:#dc2626;">' +
      '<p style="font-size:2rem;">📷</p>' +
      '<p style="font-weight:700;">Tidak bisa akses kamera</p>' +
      '<p style="font-size:0.85rem;color:#64748b;margin-top:8px;">Pastikan izin kamera diaktifkan di browser.<br>Atau gunakan browser Chrome.</p>' +
      '</div>';
  });
}

function stopScanner() {
  if (html5QrCode) {
    try { html5QrCode.stop(); } catch(e) {}
    html5QrCode = null;
  }
}

async function onScanSuccess(decodedText) {
  if (isProcessing) return;
  isProcessing = true;

  // Stop camera
  stopScanner();

  // Show processing
  document.getElementById('processing').classList.add('visible');

  try {
    // Validate QR data
    var qrData;
    try {
      qrData = JSON.parse(decodedText);
    } catch(e) {
      showResult('error', 'QR Tidak Valid', 'QR Code ini bukan QR presensi yang valid.', null);
      return;
    }

    if (!qrData.token || !qrData.course_id || !qrData.session_id) {
      showResult('error', 'QR Tidak Lengkap', 'QR Code tidak mengandung data presensi yang lengkap.', null);
      return;
    }

    // Call server
    var result = await callServer('serverScanCheckin', {
      qr_payload: decodedText,
      user_id: userId,
      device_id: 'web-scanner'
    });

    if (result.ok) {
      var status = result.data.status;
      if (status === 'checked_in') {
        showResult('success', 'Berhasil Check-in! ✅', 'Presensi kamu sudah tercatat di server.', {
          'NIM': userId,
          'Mata Kuliah': qrData.course_id,
          'Sesi': qrData.session_id,
          'Presence ID': result.data.presence_id,
          'Waktu': new Date().toLocaleString('id-ID')
        });
      } else if (status === 'already_checked_in') {
        showResult('success', 'Sudah Check-in Sebelumnya', 'Kamu sudah tercatat hadir di sesi ini.', {
          'NIM': userId,
          'Mata Kuliah': qrData.course_id,
          'Sesi': qrData.session_id,
          'Presence ID': result.data.presence_id
        });
      }
    } else {
      var errMsg = result.error || 'Unknown error';
      var errTitle = 'Gagal Check-in';
      if (errMsg === 'token_expired') {
        errTitle = 'QR Sudah Kadaluarsa ⏰';
        errMsg = 'Minta dosen untuk generate QR baru.';
      } else if (errMsg === 'token_invalid') {
        errTitle = 'Token Tidak Valid';
        errMsg = 'QR ini tidak dikenali server.';
      }
      showResult('error', errTitle, errMsg, { 'NIM': userId, 'Mata Kuliah': qrData.course_id });
    }

  } catch (err) {
    showResult('error', 'Error', err.message || String(err), null);
  }
}

function showResult(type, title, msg, details) {
  // Hide processing
  document.getElementById('processing').classList.remove('visible');

  var card = document.getElementById('result-card');
  card.className = 'result-card ' + type;

  document.getElementById('result-icon').textContent = type === 'success' ? '✅' : '❌';
  document.getElementById('result-title').textContent = title;
  document.getElementById('result-msg').textContent = msg;

  var detailEl = document.getElementById('result-detail');
  if (details) {
    var html = '';
    Object.keys(details).forEach(function(key) {
      html += '<div class="row"><span class="label">' + key + '</span><span class="val">' + details[key] + '</span></div>';
    });
    detailEl.innerHTML = html;
    detailEl.style.display = 'block';
  } else {
    detailEl.style.display = 'none';
  }

  showStep('result');
  isProcessing = false;
}

function resetAll() {
  showStep('scanner');
  startScanner();
}
</script>
</body>
</html>
